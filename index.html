/* ============ Helpers ============ */
function uid() { return Date.now() + '-' + Math.floor(Math.random()*10000); }
function showSync(text) {
  const el = document.getElementById('sync');
  if (!el) return;
  el.textContent = text || 'Saved';
  el.classList.add('show');
  clearTimeout(showSync._t);
  showSync._t = setTimeout(()=>el.classList.remove('show'), 1400);
}
function getYouTubeId(url) {
  if (!url) return null;
  const m = String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([\w-]{11})/);
  return m ? m[1] : null;
}
function getYouTubeThumb(url) {
  const id = getYouTubeId(url);
  return id ? `https://i.ytimg.com/vi/${id}/hqdefault.jpg` : null;
}
function isImageFile(name) { return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(name||''); }
function isVideoFile(name) { return /\.(mp4|webm|mov|m4v)$/i.test(name||''); }
function isPdfFile(name) { return /\.pdf$/i.test(name||''); }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric' });
}
function getSectionMeta(key) { return SECTIONS.find(s => s.key === key) || {}; }
function pickThumb(item) {
  // priority: explicit thumb > first image file > youtube thumb > first file image
  if (item.thumbUrl) return item.thumbUrl;
  const files = item.files || [];
  const img = files.find(f => isImageFile(f.name));
  if (img && img.directUrl) return img.directUrl;
  const yt = getYouTubeThumb(item.videoUrl);
  if (yt) return yt;
  return null;
}

      tagline: '영상 · 디자인 · 게임 · AI 분야의 모든 자료를 한 곳에.\n상담실 전용 큐레이션 라이브러리.',
      meta: 'EST. SBS Academy · Computer Art'
    };
  },
  defaultData() {
    const sd = {};
    SECTIONS.forEach(s => { if (!s.special) sd[s.key] = { subCategories: [], items: [] }; });
    return { sectionData: sd, favorites: [], homeContent: this.defaultHome(), settings: {} };
  },
  ensureShape(d) {
    d = d || this.defaultData();
    d.sectionData = d.sectionData || {};
    SECTIONS.forEach(s => {
      if (s.special) return;
      if (!d.sectionData[s.key]) d.sectionData[s.key] = { subCategories: [], items: [] };
      d.sectionData[s.key].subCategories = d.sectionData[s.key].subCategories || [];
      d.sectionData[s.key].items = d.sectionData[s.key].items || [];
    });
    d.favorites = d.favorites || [];
    d.homeContent = Object.assign(this.defaultHome(), d.homeContent || {});
    d.settings = d.settings || {};
    return d;
  },
  async load() {
    try {
      const snap = await DOC_REF.get();
      if (snap.exists) return this.ensureShape(snap.data());
      return this.defaultData();
    } catch(e) {
      console.error('load error', e);
      throw e;
    }
  },
  async save(data) {
    try {
      await DOC_REF.set(data, { merge: false });
      showSync('동기화 완료');
    } catch(e) {
      console.error('save error', e);
      alert('저장 실패: ' + (e.message || e));
      throw e;
    }
  },
  async uploadFile(file, onProgress) {
    const id = uid();
    const safeName = file.name.replace(/[^\w.\-가-힣 ]/g, '_');
    const path = `files/${id}/${safeName}`;
    const ref = fbStorage.ref(path);
    const task = ref.put(file);
    return new Promise((resolve, reject) => {
      task.on('state_changed',
        (snap) => {
          if (onProgress) onProgress(snap.bytesTransferred / snap.totalBytes);
        },
        (err) => reject(err),
        async () => {
          try {
            const url = await task.snapshot.ref.getDownloadURL();
            resolve({
              id: id,
              name: file.name,
              size: file.size,
              type: file.type,
              path: path,
              directUrl: url
            });
          } catch(e) { reject(e); }
        }
      );
    });
  },
  async deleteFile(file) {
    if (!file || !file.path) return;
    try { await fbStorage.ref(file.path).delete(); } catch(e) { /* ignore */ }
  }
};

/* PDF Viewer */
function PdfPreview({ url }) {
  const containerRef = useRef(null);
  const [error, setError] = useState(null);
  useEffect(() => {
    let cancelled = false;
    const container = containerRef.current;
    if (!container || !window.pdfjsLib) return;
    container.innerHTML = '';
    setError(null);
    (async () => {
      try {
        const pdf = await window.pdfjsLib.getDocument({ url, withCredentials: false }).promise;
        if (cancelled) return;
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          if (cancelled) return;
          container.appendChild(canvas);
        }
      } catch(e) {
        console.error(e);
        if (!cancelled) setError('PDF를 불러올 수 없습니다.');
      }
    })();
    return () => { cancelled = true; };
  }, [url]);
  if (error) return <div className="modal-preview-empty"><p>{error}</p></div>;
  return <div className="pdf-pages" ref={containerRef}></div>;
}

/* Edit Form Modal */
function EditModal({ item, sectionKey, subCategories, onClose, onSave, onSubCatAdd }) {
  const isNew = !item || !item.id;
  const fields = SECTION_FIELDS[sectionKey] || [];
  const [form, setForm] = useState(() => {
    const f = {};
    fields.forEach(field => { f[field.key] = (item && item[field.key]) || ''; });
    f.subId = (item && item.subId) || (subCategories[0] && subCategories[0].id) || '';
    f.files = (item && item.files) ? [...item.files] : [];
    return f;
  });
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [dragging, setDragging] = useState(false);
  const fileInputRef = useRef(null);

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  function setField(key, val) { setForm(prev => ({ ...prev, [key]: val })); }

  async function handleFiles(filesArr) {
    if (!filesArr || filesArr.length === 0) return;
    setUploading(true);
    setProgress(0);
    try {
      const newFiles = [];
      for (let i = 0; i < filesArr.length; i++) {
        const f = filesArr[i];
        const result = await Store.uploadFile(f, p => setProgress(p));
        newFiles.push(result);
      }
      setForm(prev => ({ ...prev, files: [...(prev.files||[]), ...newFiles] }));
    } catch(e) {
      alert('업로드 실패: ' + (e.message || e));
    } finally {
      setUploading(false);
      setProgress(0);
    }
  }

  function removeFile(fileId) {
    setForm(prev => ({ ...prev, files: prev.files.filter(f => f.id !== fileId) }));
  }

  function submit() {
    const titleField = fields.find(f => f.isTitle);
    if (titleField && !form[titleField.key]) {
      alert(titleField.label + '을(를) 입력하세요.');
      return;
    }
    onSave({
      ...item,
      ...form,
      id: item && item.id ? item.id : uid(),
      updatedAt: Date.now()
    });
  }

  const titleField = fields.find(f => f.isTitle) || fields[0];

  return (
    <div className="form-modal" onClick={onClose}>
      <div className="form-frame" onClick={(e)=>e.stopPropagation()}>
        <div className="form-header">
          <h3>{isNew ? '새 자료 등록' : '자료 편집'}</h3>
          <button className="form-close" onClick={onClose}>×</button>
        </div>
        <div className="form-body">
          {/* Sub category selector */}
          {subCategories.length > 0 && (
            <div className="field">
              <label>분류</label>
              <select value={form.subId} onChange={e => setField('subId', e.target.value)}>
                {subCategories.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
          )}

          {fields.map(f => (
            <div className="field" key={f.key}>
              <label>{f.label} {f.required && <span className="required">*</span>}</label>
              {f.type === 'textarea' ? (
                <textarea
                  value={form[f.key] || ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder || ''}
                />
              ) : f.type === 'select' ? (
                <select value={form[f.key] || ''} onChange={e => setField(f.key, e.target.value)}>
                  <option value="">선택</option>
                  {(f.options||[]).map(opt => <option key={opt} value={opt}>{opt}</option>)}
                </select>
              ) : (
                <input
                  type={f.type === 'date' ? 'date' : 'text'}
                  value={form[f.key] || ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder || ''}
                />
              )}
            </div>
          ))}

          {/* Files */}
          <div className="field">
            <label>첨부 파일 (이미지 / PDF / 영상)</label>
            <div
              className={'file-drop ' + (dragging ? 'dragging' : '')}
              onDragOver={(e)=>{e.preventDefault();setDragging(true);}}
              onDragLeave={()=>setDragging(false)}
              onDrop={(e)=>{
                e.preventDefault();
                setDragging(false);
                handleFiles(e.dataTransfer.files);
              }}
            >
              <div className="mark">+</div>
              <p>파일을 끌어다 놓거나 버튼으로 선택하세요</p>
              <button onClick={()=>fileInputRef.current && fileInputRef.current.click()} disabled={uploading}>
                {uploading ? `업로드 ${Math.round(progress*100)}%` : '파일 선택'}
              </button>
              <input
                ref={fileInputRef}
                type="file"
                multiple
                style={{display:'none'}}
                onChange={(e)=>handleFiles(e.target.files)}
              />
            </div>
            {form.files && form.files.length > 0 && (
              <div className="file-list">
                {form.files.map(f => (
                  <div className="file-row" key={f.id}>
                    <span className="name">{f.name}</span>
                    <button onClick={()=>removeFile(f.id)} title="삭제">×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
        <div className="form-foot">
          <div className="left">
            {subCategories.length === 0 && (
              <button className="btn ghost" onClick={onSubCatAdd}>+ 분류 추가</button>
            )}
          </div>
          <div className="right">
            <button className="btn ghost" onClick={onClose}>취소</button>
            <button className="btn amber" onClick={submit} disabled={uploading}>
              {isNew ? '등록' : '저장'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============ Rich Editor ============ */
function RichEditor({ value, onChange, placeholder }) {
  const ref = useRef(null);
  const initialized = useRef(false);

  useEffect(() => {
    if (ref.current && !initialized.current) {
      ref.current.innerHTML = value || '';
      initialized.current = true;
    }
  }, []);

  // Sync if value changes externally
  useEffect(() => {
    if (ref.current && initialized.current && document.activeElement !== ref.current) {
      if (ref.current.innerHTML !== (value || '')) {
        ref.current.innerHTML = value || '';
      }
    }
  }, [value]);

  function exec(cmd, arg) {
    document.execCommand(cmd, false, arg || null);
    ref.current.focus();
    handleInput();
  }

  function handleInput() {
    if (ref.current && onChange) {
      onChange(ref.current.innerHTML);
    }
  }

  function handleHeading(level) {
    document.execCommand('formatBlock', false, level);
    ref.current.focus();
    handleInput();
  }

  function handleLink() {
    const url = prompt('링크 URL을 입력하세요', 'https://');
    if (url && url !== 'https://') exec('createLink', url);
  }

  function handlePaste(e) {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    document.execCommand('insertText', false, text);
  }

  return (
    <>
      <div className="editor-toolbar">
        <button className="toolbar-btn h1" onClick={() => handleHeading('h1')} title="큰 제목">H1</button>
        <button className="toolbar-btn h1" onClick={() => handleHeading('h2')} title="중제목">H2</button>
        <button className="toolbar-btn h1" onClick={() => handleHeading('h3')} title="소제목">H3</button>
        <button className="toolbar-btn" onClick={() => handleHeading('p')} title="본문">¶</button>
        <span className="toolbar-sep"></span>
        <button className="toolbar-btn" onClick={() => exec('bold')} title="굵게"><strong>B</strong></button>
        <button className="toolbar-btn" onClick={() => exec('italic')} title="기울임"><em>I</em></button>
        <button className="toolbar-btn" onClick={() => exec('underline')} title="밑줄"><u>U</u></button>
        <span className="toolbar-sep"></span>
        <button className="toolbar-btn" onClick={() => exec('insertUnorderedList')} title="목록">•</button>
        <button className="toolbar-btn" onClick={() => exec('insertOrderedList')} title="번호 목록">1.</button>
        <button className="toolbar-btn" onClick={() => handleHeading('blockquote')} title="강조 인용">"</button>
        <span className="toolbar-sep"></span>
        <button className="toolbar-btn" onClick={handleLink} title="링크">🔗</button>
        <button className="toolbar-btn" onClick={() => exec('removeFormat')} title="서식 지우기">✕</button>
      </div>
      <div
        ref={ref}
        className="editor"
        contentEditable
        data-placeholder={placeholder || '내용을 입력하세요…'}
        onInput={handleInput}
        onPaste={handlePaste}
      />
    </>
  );
}

/* ============ SubCategory Page ============
   Two modes:
   - Overview (subSub === 'all'): notion body editor only, no item grid
   - Board (subSub === id): board page with item grid only, no body
============================================ */
function SubCategoryPage({
  sectionKey, sub, data, editMode,
  onBack, onSaveSub, onDelete,
  activeSubSub, setActiveSubSub,
  subSubCategories,
  onAddSubSub, onRenameSubSub, onDeleteSubSub,
  onCardOpen, onToggleFav, isFavId,
  onCardEdit, onCardDelete,
  onNewItem,
  search
}) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(sub);

  useEffect(() => { setDraft(sub); setEditing(false); }, [sub.id]);

  const sec = data.sectionData[sectionKey] || {};
  const allItems = sec.items || [];
  const itemsInSub = allItems.filter(it => String(it.subId) === String(sub.id));

  const isOverview = activeSubSub === 'all';
  const activeBoard = !isOverview ? subSubCategories.find(ss => String(ss.id) === String(activeSubSub)) : null;

  const filtered = useMemo(() => {
    if (isOverview) return [];
    let items = itemsInSub.filter(it => String(it.subSubId || '') === String(activeSubSub));
    if (search && search.trim()) {
      const q = search.trim().toLowerCase();
      items = items.filter(it => {
        const body = (it.body || '').replace(/<[^>]*>/g, ' ');
        const haystack = [it.title, it.desc, body].filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }
    return items;
  }, [itemsInSub, activeSubSub, search, isOverview]);

  function setF(key, val) { setDraft(prev => ({ ...prev, [key]: val })); }

  function saveDraft() {
    if (!draft.name || !draft.name.trim()) {
      alert('분류 이름을 입력하세요.');
      return;
    }
    onSaveSub({ ...draft, name: draft.name.trim(), updatedAt: Date.now() });
    setEditing(false);
  }

  return (
    <div className="subcat-page">
      <div className="detail-topbar">
        <div className="breadcrumb">
          <span className="crumb" onClick={onBack}>{getSectionMeta(sectionKey).name}</span>
          <span className="sep">›</span>
          {isOverview ? (
            <span className="current">{sub.name}</span>
          ) : (
            <>
              <span className="crumb" onClick={() => setActiveSubSub('all')}>{sub.name}</span>
              <span className="sep">›</span>
              <span className="current">{activeBoard ? activeBoard.name : ''}</span>
            </>
          )}
        </div>
        <div className="detail-actions">
          {isOverview && editMode && !editing && (
            <button className="detail-btn" onClick={() => setEditing(true)}>분류 편집</button>
          )}
          {isOverview && editing && (
            <>
              <button className="detail-btn" onClick={() => { setDraft(sub); setEditing(false); }}>취소</button>
              <button className="detail-btn amber" onClick={saveDraft}>저장</button>
            </>
          )}
          {isOverview && editMode && !editing && (
            <button className="detail-btn danger" onClick={() => onDelete(sub)}>분류 삭제</button>
          )}
          {!isOverview && editMode && (
            <button className="detail-btn amber" onClick={onNewItem}>+ 새 자료</button>
          )}
          {!isOverview && editMode && (
            <button
              className="detail-btn"
              onClick={() => {
                const action = prompt('1: 이름 변경 / 2: 게시판 삭제', '1');
                if (action === '1') onRenameSubSub(activeBoard);
                else if (action === '2') onDeleteSubSub(activeBoard);
              }}
            >게시판</button>
          )}
        </div>
      </div>

      <div className="subcat-page-body">
        {isOverview ? (
          /* === OVERVIEW MODE: notion body only === */
          <>
            <div className="detail-eyebrow">{getSectionMeta(sectionKey).name}</div>

            {editing ? (
              <input
                className="detail-title-input"
                value={draft.name || ''}
                onChange={e => setF('name', e.target.value)}
                placeholder="분류 이름"
              />
            ) : (
              <h1 className="detail-title">{sub.name}</h1>
            )}

            {(editing || sub.tagline) && (
              <div className="props">
                <div className="props-row">
                  <div className="props-label">한 줄 소개</div>
                  <div className="props-value">
                    {editing ? (
                      <input
                        type="text"
                        value={draft.tagline || ''}
                        onChange={e => setF('tagline', e.target.value)}
                        placeholder="예: 출판물 · 잡지 · 브랜딩"
                      />
                    ) : (sub.tagline || '')}
                  </div>
                </div>
              </div>
            )}

            <div className="body-section" style={{marginTop: 8}}>
              {editing ? (
                <RichEditor
                  value={draft.body || ''}
                  onChange={(html) => setF('body', html)}
                  placeholder="이 분류 소개를 자유롭게 작성하세요. 좌측 사이드바에서 사진/영상/링크 게시판을 추가할 수 있습니다."
                />
              ) : sub.body ? (
                <div className="body-readonly" dangerouslySetInnerHTML={{ __html: sub.body }} />
              ) : (
                <div className="empty" style={{padding: '40px 20px', textAlign: 'left'}}>
                  <div className="empty-text" style={{textAlign: 'left', maxWidth: 'none'}}>
                    {editMode
                      ? '"분류 편집" 버튼을 눌러 분류 소개를 작성하세요. 좌측 사이드바의 "+ 게시판"으로 사진/영상/링크 등 게시판을 만들 수 있습니다.'
                      : '아직 분류 소개가 작성되지 않았습니다.'}
                  </div>
                </div>
              )}
            </div>

            {/* 게시판 만들기 버튼 (편집 모드, overview에서만) */}
            {editMode && subSubCategories.length === 0 && (
              <div style={{marginTop: 32, padding: 20, border: '1px dashed var(--line-strong)', textAlign: 'center', color: 'var(--muted)'}}>
                아직 게시판이 없습니다.
                <button
                  className="detail-btn"
                  style={{marginLeft: 12}}
                  onClick={onAddSubSub}
                >+ 게시판 추가 (사진/영상/링크 등)</button>
              </div>
            )}
            {editMode && subSubCategories.length > 0 && (
              <div style={{marginTop: 32, fontSize: 12, color: 'var(--muted)'}}>
                게시판 {subSubCategories.length}개 — 좌측 사이드바에서 클릭하여 진입하세요.
                <button
                  className="detail-btn"
                  style={{marginLeft: 12, padding: '4px 10px', fontSize: 10}}
                  onClick={onAddSubSub}
                >+ 게시판</button>
              </div>
            )}
          </>
        ) : (
          /* === BOARD MODE: item grid only === */
          <>
            <div className="detail-eyebrow">{sub.name}</div>
            <h1 className="detail-title" style={{marginBottom: 18}}>
              {activeBoard ? activeBoard.name : '게시판'}
            </h1>
            <div style={{fontSize: 13, color: 'var(--muted)', marginBottom: 24}}>
              {filtered.length}건
            </div>

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="empty-mark">∅</div>
                <div className="empty-title">자료가 없습니다</div>
                <div className="empty-text">
                  {editMode ? '+ 새 자료 버튼으로 등록하세요.' : '편집 모드에서 자료를 등록할 수 있습니다.'}

              <div className="grid">
                {filtered.map(item => (
                  <Card
                    key={item.id}
                    item={item}
                    sectionKey={sectionKey}

                    isFav={isFavId(item.id)}

    </div>
  );
}


/* ============ Detail Page ============ */
function Detail({ item, sectionKey, data, onClose, onSave, onDelete, onToggleFav, isFav, onPreviewMedia, editMode }) {
  const sectionMeta = getSectionMeta(sectionKey);
  const fields = SECTION_FIELDS[sectionKey] || [];
  const titleField = fields.find(f => f.isTitle) || fields[0];

  const [editing, setEditing] = useState(item._isNew || false);
  const [draft, setDraft] = useState(item);

  useEffect(() => { setDraft(item); }, [item]);
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [item.id]);

  const sub = useMemo(() => {
    const subs = (data.sectionData[sectionKey] && data.sectionData[sectionKey].subCategories) || [];
    return subs.find(s => String(s.id) === String(item.subId));
  }, [data, sectionKey, item]);

  const subSub = useMemo(() => {
    if (!sub) return null;
    const subSubs = sub.subSubCategories || [];
    return subSubs.find(s => String(s.id) === String(item.subSubId));
  }, [sub, item]);

  function setF(key, val) { setDraft(prev => ({ ...prev, [key]: val })); }

  function saveDraft() {
    if (!draft[titleField.key]) {
      alert(titleField.label + '을(를) 입력하세요.');
      return;
    }
    onSave({ ...draft, updatedAt: Date.now() });
    setEditing(false);
  }

  function cancelEdit() {
    setDraft(item);
    setEditing(false);
  }

  const files = (editing ? draft.files : item.files) || [];
  const fileInputRef = useRef(null);
  const [uploading, setUploading] = useState(false);

  async function uploadFiles(filesArr) {
    if (!filesArr || filesArr.length === 0) return;
    setUploading(true);
    try {
      const newFiles = [];
      for (let i = 0; i < filesArr.length; i++) {
        const result = await Store.uploadFile(filesArr[i]);
        newFiles.push(result);
      }
      setDraft(prev => ({ ...prev, files: [...(prev.files || []), ...newFiles] }));
    } catch(e) {
      alert('업로드 실패: ' + (e.message || e));
    } finally {
      setUploading(false);
    }
  }

  function removeFile(fileId) {
    setDraft(prev => ({ ...prev, files: (prev.files || []).filter(f => f.id !== fileId) }));
  }

  return (
    <div className="detail">
      <div className="detail-topbar">
        <div className="breadcrumb">
          <span className="crumb" onClick={onClose}>{sectionMeta.name}</span>
          {sub && <>
            <span className="sep">›</span>
            <span className="crumb">{sub.name}</span>
          </>}
          {subSub && <>
            <span className="sep">›</span>
            <span className="crumb">{subSub.name}</span>
          </>}
          <span className="sep">›</span>
          <span className="current">{item[titleField.key] || '제목 없음'}</span>
        </div>
        <div className="detail-actions">
          <button
            className={'detail-btn fav ' + (isFav ? 'active' : '')}
            onClick={() => onToggleFav(item)}
            title="즐겨찾기"
          >{isFav ? '★' : '☆'}</button>
          {editMode && !editing && (
            <button className="detail-btn" onClick={() => setEditing(true)}>편집</button>
          )}
          {editing && (
            <>
              <button className="detail-btn" onClick={cancelEdit}>취소</button>
              <button className="detail-btn amber" onClick={saveDraft}>저장</button>
            </>
          )}
          {editMode && !editing && (
            <button className="detail-btn danger" onClick={() => onDelete(item)}>삭제</button>
          )}
          <button className="detail-btn" onClick={onClose}>← 돌아가기</button>
        </div>
      </div>

      <div className="detail-cover"></div>

      <div className="detail-body">
        <div className="detail-eyebrow">
          {sectionMeta.name}{sub ? ' · ' + sub.name : ''}{subSub ? ' · ' + subSub.name : ''}
        </div>

        {editing ? (
          <input
            className="detail-title-input"
            value={draft[titleField.key] || ''}
            onChange={e => setF(titleField.key, e.target.value)}
            placeholder={titleField.label}
          />
        ) : (
          <h1 className="detail-title">{item[titleField.key] || '제목 없음'}</h1>
        )}

        {/* Properties */}
        <div className="props">
          {fields.filter(f => !f.isTitle && f.key !== 'desc').map(f => {
            const v = editing ? draft[f.key] : item[f.key];
            if (!editing && !v) return null;
            return (
              <div className="props-row" key={f.key}>
                <div className="props-label">{f.label}{f.required && editing ? ' *' : ''}</div>
                <div className="props-value">
                  {editing ? (
                    f.type === 'textarea' ? (
                      <textarea value={v || ''} onChange={e => setF(f.key, e.target.value)} placeholder={f.placeholder || ''} />
                    ) : f.type === 'select' ? (
                      <select value={v || ''} onChange={e => setF(f.key, e.target.value)}>
                        <option value="">선택</option>
                        {(f.options || []).map(opt => <option key={opt} value={opt}>{opt}</option>)}
                      </select>
                    ) : (
                      <input
                        type={f.type === 'date' ? 'date' : 'text'}
                        value={v || ''}
                        onChange={e => setF(f.key, e.target.value)}
                        placeholder={f.placeholder || ''}
                      />
                    )
                  ) : (
                    f.key.toLowerCase().includes('url') && v ? (
                      <a href={v} target="_blank" rel="noopener noreferrer">{v}</a>
                    ) : v
                  )}
                </div>
              </div>
            );
          })}
          {/* Description short */}
          {(editing || item.desc) && (
            <div className="props-row">
              <div className="props-label">한줄 설명</div>
              <div className="props-value">
                {editing ? (
                  <textarea value={draft.desc || ''} onChange={e => setF('desc', e.target.value)} placeholder="짧은 설명" />
                ) : item.desc}
              </div>
            </div>
          )}
        </div>

        {/* Body content */}
        <div className="body-section">
          <div className="body-label">— 본문 내용</div>
          {editing ? (
            <RichEditor
              value={draft.body || ''}
              onChange={(html) => setF('body', html)}
              placeholder="자유롭게 작성하세요. 헤딩·목록·강조·링크 등을 사용할 수 있습니다."
            />
          ) : (
            item.body
              ? <div className="body-readonly" dangerouslySetInnerHTML={{ __html: item.body }} />
              : null
          )}
        </div>

        {/* Files */}
        {(editing || files.length > 0) && (
          <div className="detail-media">
            <div className="body-label">— 첨부 파일 ({files.length})</div>
            {editing && (
              <div style={{marginBottom: 12}}>
                <button
                  className="detail-btn"
                  onClick={() => fileInputRef.current && fileInputRef.current.click()}
                  disabled={uploading}
                >{uploading ? '업로드 중…' : '+ 파일 추가'}</button>
                <input
                  ref={fileInputRef}
                  type="file"
                  multiple
                  style={{display: 'none'}}
                  onChange={e => uploadFiles(e.target.files)}
                />
              </div>
            )}
            {files.length > 0 && (
              <div className="detail-media-grid">
                {files.map(f => {
                  const isImg = isImageFile(f.name);
                  const isVid = isVideoFile(f.name);
                  const isPdf = isPdfFile(f.name);
                  function handleClick() {
                    if (isImg || isVid) {
                      onPreviewMedia(f);
                    } else if (f.directUrl) {
                      // PDF and others: open in new tab
                      window.open(f.directUrl, '_blank', 'noopener,noreferrer');
                    }
                  }
                  return (
                    <div key={f.id} className="detail-media-item">
                      <div className="detail-media-thumb" onClick={handleClick}>
                        {isImg && f.directUrl
                          ? <img src={f.directUrl} alt="" />
                          : isVid ? '🎬'
                          : isPdf ? '📄'
                          : '📎'}
                      </div>
                      <div className="detail-media-info">
                        <div className="type">
                          {isImg ? '이미지' : isVid ? '영상' : isPdf ? 'PDF' : '파일'}
                        </div>
                        <div className="name" title={f.name}>{f.name}</div>
                        {(isPdf || (!isImg && !isVid)) && f.directUrl && (
                          <a
                            href={f.directUrl}
                            target="_blank"
                            rel="noopener noreferrer"
                            onClick={(e) => e.stopPropagation()}
                            style={{display:'inline-block', marginTop:4, fontSize:10, color:'var(--amber)', textDecoration:'none', borderBottom:'1px solid rgba(184,132,45,0.3)'}}
                          >새 창에서 열기 →</a>
                        )}
                        {editing && (
                          <button
                            onClick={(e) => { e.stopPropagation(); removeFile(f.id); }}
                            style={{marginTop:4, marginLeft:8, fontSize:10, background:'transparent', border:'none', color:'var(--rose)', cursor:'pointer', padding: 0}}
                          >삭제</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


function Confirm({ title, text, onConfirm, onCancel, danger }) {
  return (
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-box" onClick={(e)=>e.stopPropagation()}>
        <div className="confirm-title">{title}</div>
        <div className="confirm-text">{text}</div>
        <div className="confirm-actions">
          <button className="btn ghost" onClick={onCancel}>취소</button>
          <button className={'btn ' + (danger ? '' : 'amber')} onClick={onConfirm}>
            {danger ? '삭제' : '확인'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============ Home Page ============ */
function Home({ data, sectionCounts, onSelectSection, editMode, onSaveHome, totalItems, totalFavs }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(data.homeContent);

  function startEdit() {
    setDraft(data.homeContent);
    setEditing(true);
  }
  function cancelEdit() { setEditing(false); }
  async function saveEdit() {
    await onSaveHome(draft);
    setEditing(false);
  }

  function setField(k, v) { setDraft(prev => ({ ...prev, [k]: v })); }

  const home = editing ? draft : data.homeContent;

  // Render title with em-emphasis
  function renderTitle() {
    const { titleLine1, titleLine2, titleEm } = home;
    // If titleEm matches part of titleLine2, italic-amber that part
    if (titleEm && titleLine2 && titleLine2.includes(titleEm)) {
      const idx = titleLine2.indexOf(titleEm);
      const before = titleLine2.slice(0, idx);
      const after = titleLine2.slice(idx + titleEm.length);
      return (
        <>
          {titleLine1}<br/>
          {before}<em>{titleEm}</em>{after}
        </>
      );
    }
    return <>{titleLine1}<br/>{titleLine2}</>;
  }

  return (
    <div className="home">
      <div className="home-orbit"></div>
      <div className="home-inner">

        <div className="home-topbar">
          <span>{home.meta}</span>
          <div className="right">
            <span>2026 · Seoul</span>
            {editMode && !editing && (
              <button
                onClick={startEdit}
                style={{background:'transparent',border:'1px solid var(--line-strong)',color:'var(--ink)',padding:'5px 12px',fontSize:'10px',letterSpacing:'.2em',textTransform:'uppercase',cursor:'pointer',fontWeight:500}}
              >메인 수정</button>
            )}
          </div>
        </div>

        {/* HERO */}
        <div className="home-hero">
          {editing ? (
            <>
              <input
                className="home-tagline-edit"
                style={{fontSize:'11px',letterSpacing:'.35em',textTransform:'uppercase',color:'var(--amber)',marginBottom:'20px'}}
                value={draft.eyebrow}
                onChange={(e)=>setField('eyebrow',e.target.value)}
                placeholder="EYEBROW"
              />
              <input
                className="home-title-edit"
                style={{fontSize:'40px',marginBottom:'8px'}}
                value={draft.titleLine1}
                onChange={(e)=>setField('titleLine1',e.target.value)}
                placeholder="제목 1행"
              />
              <input
                className="home-title-edit"
                style={{fontSize:'40px',marginBottom:'8px'}}
                value={draft.titleLine2}
                onChange={(e)=>setField('titleLine2',e.target.value)}
                placeholder="제목 2행"
              />
              <input
                className="home-tagline-edit"
                style={{fontSize:'12px',marginBottom:'16px',color:'var(--amber-soft)'}}
                value={draft.titleEm}
                onChange={(e)=>setField('titleEm',e.target.value)}
                placeholder="제목 2행 중 강조할 부분 (앰버 색상)"
              />
              <textarea
                className="home-tagline-edit"
                style={{fontSize:'14px',minHeight:'70px'}}
                value={draft.tagline}
                onChange={(e)=>setField('tagline',e.target.value)}
                placeholder="설명 문구"
              />
              <div className="home-edit-actions">
                <button className="home-edit-btn" onClick={saveEdit}>저장</button>
                <button className="home-edit-btn ghost" onClick={cancelEdit}>취소</button>
              </div>
            </>
          ) : (
            <>
              <div className="home-eyebrow">{home.eyebrow}</div>
              <h1 className="home-title">{renderTitle()}</h1>
              <p className="home-tagline">{home.tagline}</p>
            </>
          )}
        </div>

        {/* STATS */}
        <div className="home-stats">
          <div>
            <div className="home-stat-num">{String(SECTIONS.filter(s=>!s.special).length).padStart(2,'0')}</div>
            <div className="home-stat-label">Categories</div>
          </div>
          <div>
            <div className="home-stat-num">{totalItems}</div>
            <div className="home-stat-label">Materials</div>
          </div>
          <div>
            <div className="home-stat-num amber">★ {totalFavs}</div>
            <div className="home-stat-label">Pinned</div>
          </div>
        </div>

        {/* SECTION GRID */}
        <div className="home-section-label">Browse Categories</div>
        <div className="home-grid">
          {SECTIONS.map((s, i) => {
            const count = sectionCounts[s.key] || 0;
            const isFeatured = s.special; // favorites featured
            return (
              <div
                key={s.key}
                className={'home-card' + (isFeatured ? ' featured' : '')}
                onClick={()=>onSelectSection(s.key)}
              >
                <div className="home-card-num">
                  {s.special ? '★' : String(SECTIONS.filter(x=>!x.special).indexOf(s)+1).padStart(2,'0')}
                </div>
                {s.special && <div className="home-card-badge">Pinned</div>}
                <div className="home-card-title">{s.name}</div>
                <div className="home-card-desc">{s.sub}</div>
                <div className="home-card-foot">
                  <span className="home-card-count">{count}건</span>
                  <span className="arrow">→</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}


/* ============ Main App ============ */
function App() {
  const [data, setData] = useState(null);
  const [activeSection, setActiveSection] = useState('home');
  const [activeSub, setActiveSub] = useState('all');
  const [activeSubSub, setActiveSubSub] = useState('all');
  const [search, setSearch] = useState('');
  const [detailItem, setDetailItem] = useState(null);
  const [previewItem, setPreviewItem] = useState(null);
  const [mediaPreview, setMediaPreview] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [confirm, setConfirm] = useState(null);
  const [user, setUser] = useState(fbAuth.currentUser);

  // Auth listener
  useEffect(() => {
    const unsub = fbAuth.onAuthStateChanged(u => setUser(u));
    return unsub;
  }, []);

  // Load data
  useEffect(() => {
    Store.load().then(d => setData(d)).catch(e => {
      alert('데이터 로드 실패: ' + (e.message || e));
      setData(Store.defaultData());
    });
  }, []);

  // Save helper
  const persist = useCallback(async (next) => {
    setData(next);
    await Store.save(next);
  }, []);

  // Derived: current section data + filtered items
  const currentSection = useMemo(() => getSectionMeta(activeSection), [activeSection]);
  const isFavView = activeSection === 'favorites';

  const allItems = useMemo(() => {
    if (!data) return [];
    if (isFavView) {
      const favIds = data.favorites || [];
      const all = [];
      Object.keys(data.sectionData).forEach(sk => {
        (data.sectionData[sk].items || []).forEach(it => {
          if (favIds.includes(it.id)) all.push({ ...it, _section: sk });
        });
      });
      return all;
    }
    const sec = data.sectionData[activeSection];
    if (!sec) return [];
    return (sec.items || []).map(it => ({ ...it, _section: activeSection }));
  }, [data, activeSection, isFavView]);

  const subCategories = useMemo(() => {
    if (!data || isFavView) return [];
    const sec = data.sectionData[activeSection];
    return sec ? (sec.subCategories || []) : [];
  }, [data, activeSection, isFavView]);

  const activeSubObj = useMemo(() => {
    if (activeSub === 'all') return null;
    return subCategories.find(s => String(s.id) === String(activeSub));
  }, [subCategories, activeSub]);

  const subSubCategories = useMemo(() => {
    if (!activeSubObj) return [];
    return activeSubObj.subSubCategories || [];
  }, [activeSubObj]);

  const filteredItems = useMemo(() => {
    let items = allItems;
    if (!isFavView && activeSub !== 'all') {
      items = items.filter(it => String(it.subId) === String(activeSub));
      if (activeSubSub !== 'all') {
        items = items.filter(it => String(it.subSubId || '') === String(activeSubSub));
      }
    }
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      items = items.filter(it => {
        const body = (it.body || '').replace(/<[^>]*>/g, ' ');
        const haystack = [it.title, it.desc, it.author, it.speaker, it.specialty, it.career, it.location, it.source, body]
          .filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }
    return items;
  }, [allItems, activeSub, activeSubSub, search, isFavView]);

  const sectionCounts = useMemo(() => {
    const counts = {};
    if (!data) return counts;
    SECTIONS.forEach(s => {
      if (s.special) {
        counts[s.key] = (data.favorites || []).length;
      } else {
        counts[s.key] = ((data.sectionData[s.key] || {}).items || []).length;
      }
    });
    return counts;
  }, [data]);

  const totalItems = useMemo(() => {
    if (!data) return 0;
    return SECTIONS.filter(s => !s.special).reduce((acc, s) => {
      return acc + (((data.sectionData[s.key] || {}).items || []).length);
    }, 0);
  }, [data]);

  const totalFavs = useMemo(() => (data ? (data.favorites || []).length : 0), [data]);

  // Sync detail item with latest data after edits
  useEffect(() => {
    if (!detailItem || !data) return;
    const sk = detailItem._section;
    const sec = data.sectionData[sk];
    if (!sec) return;
    const fresh = (sec.items || []).find(it => String(it.id) === String(detailItem.id));
    if (fresh && JSON.stringify(fresh) !== JSON.stringify({ ...detailItem, _section: undefined })) {
      setDetailItem({ ...fresh, _section: sk });
    }
  }, [data]);

  // Reset subSub when sub changes
  useEffect(() => { setActiveSubSub('all'); }, [activeSub]);

  // Reset sub when section changes
  useEffect(() => { setActiveSub('all'); }, [activeSection]);

  // ============ Actions ============
  function selectSection(key) {
    setActiveSection(key);
    setSidebarOpen(false);
    // Scroll to top on section change
    setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
  }

  async function saveHomeContent(homeContent) {
    await persist({ ...data, homeContent });
  }

  async function toggleFav(item) {
    const favs = new Set(data.favorites || []);
    if (favs.has(item.id)) favs.delete(item.id);
    else favs.add(item.id);
    await persist({ ...data, favorites: Array.from(favs) });
  }

  async function saveItem(item) {
    const sectionKey = item._section || (editingItem && editingItem._section) || activeSection;
    if (sectionKey === 'favorites') return;
    // Strip internal flags that shouldn't be persisted
    const clean = { ...item };
    delete clean._section;
    delete clean._isNew;
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[sectionKey];
    sec.items = sec.items || [];
    const idx = sec.items.findIndex(x => String(x.id) === String(clean.id));
    if (idx >= 0) sec.items[idx] = clean;
    else sec.items.push(clean);
    setEditingItem(null);
    // Update detail item to reflect saved state (re-attach _section)
    if (detailItem && String(detailItem.id) === String(clean.id)) {
      setDetailItem({ ...clean, _section: sectionKey });
    }
    await persist(next);
  }

  async function deleteItem(item) {
    const sectionKey = item._section || activeSection;
    setConfirm({
      title: '자료 삭제',
      text: `"${item.title || '제목 없음'}"을(를) 삭제하시겠습니까? 첨부 파일도 함께 삭제됩니다.`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        const next = JSON.parse(JSON.stringify(data));
        const sec = next.sectionData[sectionKey];
        const removed = (sec.items || []).find(x => String(x.id) === String(item.id));
        sec.items = (sec.items || []).filter(x => String(x.id) !== String(item.id));
        next.favorites = (next.favorites || []).filter(id => id !== item.id);
        if (removed && removed.files) removed.files.forEach(f => Store.deleteFile(f));
        // Close detail if showing this item
        if (detailItem && String(detailItem.id) === String(item.id)) {
          setDetailItem(null);
        }
        await persist(next);
      }
    });
  }

  async function addSubCategory() {
    const name = prompt('새 분류 이름');
    if (!name) return;
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[activeSection];
    sec.subCategories = sec.subCategories || [];
    sec.subCategories.push({ id: uid(), name: name.trim() });
    await persist(next);
  }

  async function saveSubCategory(updatedSub) {
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[activeSection];
    sec.subCategories = (sec.subCategories || []).map(s =>
      String(s.id) === String(updatedSub.id) ? { ...s, ...updatedSub } : s
    );
    await persist(next);
  }

  async function renameSubCategory(sub) {
    const name = prompt('분류 이름 수정', sub.name);
    if (!name || name === sub.name) return;
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[activeSection];
    sec.subCategories = sec.subCategories.map(s =>
      String(s.id) === String(sub.id) ? { ...s, name: name.trim() } : s
    );
    await persist(next);
  }

  async function deleteSubCategory(sub) {
    setConfirm({
      title: '분류 삭제',
      text: `"${sub.name}" 분류와 그 안의 모든 자료를 삭제하시겠습니까?`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        const next = JSON.parse(JSON.stringify(data));
        const sec = next.sectionData[activeSection];
        const itemsToRemove = (sec.items || []).filter(x => String(x.subId) === String(sub.id));
        itemsToRemove.forEach(it => (it.files || []).forEach(f => Store.deleteFile(f)));
        const removeIds = new Set(itemsToRemove.map(x => x.id));
        sec.items = (sec.items || []).filter(x => !removeIds.has(x.id));
        sec.subCategories = (sec.subCategories || []).filter(s => String(s.id) !== String(sub.id));
        next.favorites = (next.favorites || []).filter(id => !removeIds.has(id));
        await persist(next);
      }
    });
  }

  // ------- 3rd tier (subSub) handlers -------
  async function addSubSubCategory() {
    if (!activeSubObj) { alert('먼저 2단계 분류를 선택하세요.'); return; }
    const name = prompt('새 하위 분류 이름 (예: 사진, 영상, 링크)');
    if (!name) return;
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[activeSection];
    sec.subCategories = sec.subCategories.map(s => {
      if (String(s.id) !== String(activeSubObj.id)) return s;
      const subSubs = s.subSubCategories || [];
      subSubs.push({ id: uid(), name: name.trim() });
      return { ...s, subSubCategories: subSubs };
    });
    await persist(next);
  }

  async function renameSubSubCategory(subSub) {
    const name = prompt('하위 분류 이름 수정', subSub.name);
    if (!name || name === subSub.name) return;
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[activeSection];
    sec.subCategories = sec.subCategories.map(s => {
      if (String(s.id) !== String(activeSubObj.id)) return s;
      const subSubs = (s.subSubCategories || []).map(ss =>
        String(ss.id) === String(subSub.id) ? { ...ss, name: name.trim() } : ss
      );
      return { ...s, subSubCategories: subSubs };
    });
    await persist(next);
  }

  async function deleteSubSubCategory(subSub) {
    setConfirm({
      title: '하위 분류 삭제',
      text: `"${subSub.name}" 하위 분류 안의 자료들은 분류 없음 상태가 됩니다. 계속하시겠습니까?`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        const next = JSON.parse(JSON.stringify(data));
        const sec = next.sectionData[activeSection];
        sec.subCategories = sec.subCategories.map(s => {
          if (String(s.id) !== String(activeSubObj.id)) return s;
          const subSubs = (s.subSubCategories || []).filter(ss => String(ss.id) !== String(subSub.id));
          return { ...s, subSubCategories: subSubs };
        });
        // Clear subSubId from items that had it
        sec.items = (sec.items || []).map(it =>
          String(it.subSubId || '') === String(subSub.id) ? { ...it, subSubId: '' } : it
        );
        await persist(next);
      }
    });
  }

  async function openNew() {
    if (isFavView) {
      alert('새 자료는 각 섹션에서 등록해 주세요.');
      return;
    }
    if (subCategories.length === 0) {
      const name = prompt('첫 분류의 이름을 입력하세요\n(예: 편집디자인, 3D 애니메이션)');
      if (!name) return;
      const next = JSON.parse(JSON.stringify(data));
      const sec = next.sectionData[activeSection];
      sec.subCategories = sec.subCategories || [];
      const newSub = { id: uid(), name: name.trim() };
      sec.subCategories.push(newSub);
      await persist(next);
      // proceed with this new sub selected
      const newItem = {
        id: uid(),
        _section: activeSection,
        subId: newSub.id,
        subSubId: activeSubSub !== 'all' ? activeSubSub : '',
        title: '',
        desc: '',
        body: '',
        files: [],
        updatedAt: Date.now()
      };
      setDetailItem({ ...newItem, _isNew: true });
      return;
    }
    // Create blank item with reasonable defaults
    const subId = activeSub !== 'all' ? activeSub : (subCategories[0] && subCategories[0].id);
    const newItem = {
      id: uid(),
      _section: activeSection,
      subId: subId,
      subSubId: activeSubSub !== 'all' ? activeSubSub : '',
      title: '',
      desc: '',
      body: '',
      files: [],
      updatedAt: Date.now()
    };
    setDetailItem({ ...newItem, _isNew: true });
  }

  // ============ Render ============
  if (!data) {
    return (
      <div style={{padding:80,textAlign:'center',color:'var(--muted)'}}>
        <div className="loading-bar" style={{margin:'0 auto'}}></div>
        <p style={{marginTop:20}}>데이터 불러오는 중…</p>
      </div>
    );
  }

  const isFav = (id) => (data.favorites || []).includes(id);

  return (
    <>
      <button className="mobile-toggle" onClick={()=>setSidebarOpen(true)} aria-label="메뉴">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div className={'sidebar-overlay ' + (sidebarOpen ? 'open' : '')} onClick={()=>setSidebarOpen(false)}></div>

      <div className="app">
        {/* SIDEBAR */}
        <aside className={'sidebar ' + (sidebarOpen ? 'open' : '')}>
          <div className="brand">
            <div className="brand-mark">SBS<span className="amp"> · </span><em>Academy</em></div>
            <div className="brand-sub">Consultation Library</div>
          </div>

          <div className="search-box">
            <svg className="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
            </svg>
            <input
              type="text"
              placeholder="검색…"
              value={search}
              onChange={(e)=>setSearch(e.target.value)}
            />
          </div>

          <div className="nav-label">Overview</div>
          <ul className="nav-list">
            <li className={'nav-item ' + (activeSection === 'home' ? 'active' : '')}
                onClick={()=>selectSection('home')}>
              <span className="nav-name">홈</span>
              <span className="nav-count"></span>
            </li>
          </ul>

          <div className="nav-label">Sections</div>
          <ul className="nav-list">
            {SECTIONS.filter(s => !s.special).map(s => {
              const isActiveSection = activeSection === s.key;
              const sec = data.sectionData[s.key] || {};
              const subs = sec.subCategories || [];
              return (
                <React.Fragment key={s.key}>
                  <li className={'nav-item ' + (isActiveSection ? 'active' : '')}
                      onClick={()=>selectSection(s.key)}>
                    <span className="nav-name">
                      {isActiveSection && subs.length > 0 ? '▾ ' : '▸ '}
                      {s.name}
                    </span>
                    <span className="nav-count">{sectionCounts[s.key] || 0}</span>
                  </li>
                  {isActiveSection && subs.map(sub => {
                    const isActiveSub = String(activeSub) === String(sub.id);
                    const subSubs = sub.subSubCategories || [];
                    return (
                      <React.Fragment key={sub.id}>
                        <li className={'nav-item nav-sub ' + (isActiveSub && activeSubSub === 'all' ? 'active' : '')}
                            onClick={()=>{ setActiveSub(sub.id); setActiveSubSub('all'); setSidebarOpen(false); }}>
                          <span className="nav-name">
                            {isActiveSub && subSubs.length > 0 ? '▾ ' : ''}
                            {sub.name}
                          </span>
                        </li>
                        {isActiveSub && subSubs.map(ss => (
                          <li key={ss.id}
                              className={'nav-item nav-subsub ' + (String(activeSubSub) === String(ss.id) ? 'active' : '')}
                              onClick={()=>{ setActiveSubSub(ss.id); setSidebarOpen(false); }}>
                            <span className="nav-name">{ss.name}</span>
                          </li>
                        ))}
                      </React.Fragment>
                    );
                  })}
                </React.Fragment>
              );
            })}
          </ul>

          <div className="nav-label">Pinned</div>
          <ul className="nav-list">
            {SECTIONS.filter(s => s.special).map(s => (
              <li key={s.key}
                  className={'nav-item ' + (activeSection === s.key ? 'active' : '')}
                  onClick={()=>selectSection(s.key)}>
                <span className="nav-name">★ {s.name}</span>
                <span className="nav-count">{sectionCounts[s.key] || 0}</span>
              </li>
            ))}
          </ul>

          <div className="sidebar-footer">
            <span className="user-email">{user ? user.email : ''}</span>
            <div className="sidebar-actions">
              <button className="sidebar-btn" onClick={()=>setEditMode(v => !v)}>
                {editMode ? '잠금' : '편집'}
              </button>
              <button className="sidebar-btn danger" onClick={()=>fbAuth.signOut()}>로그아웃</button>
            </div>
          </div>
        </aside>

        {/* MAIN */}
        <main className="main" style={(activeSection==='home' && !detailItem) ? {background:'transparent',padding:0} : (detailItem ? {background:'transparent',padding:0} : {})}>
          {detailItem ? (
            <Detail
              item={detailItem}
              sectionKey={detailItem._section || activeSection}
              data={data}
              isFav={isFav(detailItem.id)}
              onClose={() => setDetailItem(null)}
              onSave={saveItem}
              onDelete={deleteItem}
              onToggleFav={toggleFav}
              onPreviewMedia={(file) => setMediaPreview(file)}
              editMode={editMode}
            />
          ) : activeSection === 'home' ? (
            <Home
              data={data}
              sectionCounts={sectionCounts}
              onSelectSection={selectSection}
              editMode={editMode}
              onSaveHome={saveHomeContent}
              totalItems={totalItems}
              totalFavs={totalFavs}
            />
          ) : (
            <>
              <header className="main-header">
                <div className="header-text">
                  <div className="header-eyebrow">
                    {isFavView ? 'Pinned Materials' : 'Section ' + (SECTIONS.findIndex(s=>s.key===activeSection)+1).toString().padStart(2,'0')}
                  </div>
                  <h1 className="header-title">
                    {isFavView ? <em>즐겨찾기</em> : <>{currentSection.name}</>}
                  </h1>
                  <div className="header-meta">
                    <span>{currentSection.sub || '자주 보여주는 자료 모음'}</span>
                    <span className="dot"></span>
                    <span>
                      {isFavView
                        ? `${filteredItems.length}건`
                        : `${subCategories.length}개 분류 · ${allItems.length}건`}
                    </span>
                  </div>
                </div>
                <div className="header-actions">
                  {!isFavView && !activeSubObj && editMode && (
                    <button className="btn ghost" onClick={addSubCategory}>+ 분류 추가</button>
                  )}
                </div>
              </header>

              {isFavView ? (
                /* 즐겨찾기: 그냥 그리드 */
                <div className="grid-wrap">
                  {filteredItems.length === 0 ? (
                    <div className="empty">
                      <div className="empty-mark">∅</div>
                      <div className="empty-title">즐겨찾기가 없습니다</div>
                      <div className="empty-text">카드의 별 아이콘을 눌러 즐겨찾기에 추가하세요.</div>
                    </div>
                  ) : (
                    <div className="grid">
                      {filteredItems.map(item => {
                        const sectionKey = item._section || activeSection;
                        return (
                          <Card
                            key={item.id}
                            item={item}
                            sectionKey={sectionKey}
                            onOpen={(it)=>setDetailItem({...it, _section: sectionKey})}
                            onToggleFav={toggleFav}
                            isFav={isFav(item.id)}
                            onEdit={(it)=>setDetailItem({...it, _section: sectionKey})}
                            onDelete={(it)=>deleteItem({...it, _section: sectionKey})}
                            editMode={editMode}
                          />
                        );
                      })}
                    </div>
                  )}
                </div>
              ) : activeSubObj ? (
                /* 분류가 선택됨 → 분류 페이지 (노션식) */
                <SubCategoryPage
                  sectionKey={activeSection}
                  sub={activeSubObj}
                  data={data}
                  editMode={editMode}
                  onBack={() => setActiveSub('all')}
                  onSaveSub={saveSubCategory}
                  onDelete={deleteSubCategory}
                  activeSubSub={activeSubSub}
                  setActiveSubSub={setActiveSubSub}
                  subSubCategories={subSubCategories}
                  onAddSubSub={addSubSubCategory}
                  onRenameSubSub={renameSubSubCategory}
                  onDeleteSubSub={deleteSubSubCategory}
                  onCardOpen={(it)=>setDetailItem(it)}
                  onCardEdit={(it)=>setDetailItem(it)}
                  onCardDelete={(it)=>deleteItem(it)}
                  onToggleFav={toggleFav}
                  isFavId={isFav}
                  onNewItem={openNew}
                  search={search}
                />
              ) : (
                /* 분류 카드 그리드 (랜딩) */
                <div className="subcat-landing">
                  {subCategories.length === 0 && !editMode ? (
                    <div className="empty">
                      <div className="empty-mark">∅</div>
                      <div className="empty-title">분류가 없습니다</div>
                      <div className="empty-text">편집 모드에서 분류를 추가할 수 있습니다.</div>
                    </div>
                  ) : (
                    <div className="subcat-landing-grid">
                      {subCategories.map((sub, idx) => {
                        const c = allItems.filter(it => String(it.subId) === String(sub.id)).length;
                        const subSubCount = (sub.subSubCategories || []).length;
                        return (
                          <div
                            key={sub.id}
                            className="subcat-card"
                            onClick={() => setActiveSub(sub.id)}
                          >
                            <div className="subcat-card-num">{String(idx + 1).padStart(2, '0')}</div>
                            {editMode && (
                              <div className="subcat-card-actions">
                                <button
                                  className="subcat-card-action"
                                  title="이름 변경"
                                  onClick={(e) => { e.stopPropagation(); renameSubCategory(sub); }}
                                >✎</button>
                                <button
                                  className="subcat-card-action"
                                  title="삭제"
                                  onClick={(e) => { e.stopPropagation(); deleteSubCategory(sub); }}
                                >×</button>
                              </div>
                            )}
                            <div className="subcat-card-title">{sub.name}</div>
                            {sub.tagline && <div className="subcat-card-meta">{sub.tagline}</div>}
                            <div className="subcat-card-foot">
                              <span>자료 {c}건{subSubCount > 0 ? ` · 하위 ${subSubCount}` : ''}</span>
                              <span className="arrow">→</span>
                            </div>
                          </div>
                        );
                      })}
                      {editMode && (
                        <div className="subcat-add-card" onClick={addSubCategory}>
                          + 새 분류 추가
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </main>
      </div>

      {/* Media Preview (when clicking a file in detail page) */}
      {mediaPreview && (
        <MediaPreview
          file={mediaPreview}
          onClose={()=>setMediaPreview(null)}
        />
      )}

      {/* Confirm */}
      {confirm && (
        <Confirm
          title={confirm.title}
          text={confirm.text}
          danger={confirm.danger}
          onConfirm={confirm.onConfirm}
          onCancel={()=>setConfirm(null)}
        />
      )}
    </>
  );
}

/* ============ Bootstrap ============ */
const loadingEl = document.getElementById('loading');
const loginScreen = document.getElementById('login-screen');
const loginEmail = document.getElementById('login-email');
const loginPass = document.getElementById('login-password');
const loginBtn = document.getElementById('login-submit');
const loginErr = document.getElementById('login-error');

let appRendered = false;

function setLoginLoading(b) {
  loginBtn.disabled = b;
  loginBtn.textContent = b ? '로그인 중…' : '로그인';
}

async function attemptLogin() {
  const email = loginEmail.value.trim();
  const pass = loginPass.value;
  if (!email || !pass) {
    loginErr.textContent = '이메일과 비밀번호를 입력하세요.';
    return;
  }
  loginErr.textContent = '';
  setLoginLoading(true);
  try {
    await fbAuth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    const msg = (e.code || '').includes('user-not-found') ? '등록되지 않은 이메일입니다.' :
                (e.code || '').includes('wrong-password') ? '비밀번호가 올바르지 않습니다.' :
                (e.code || '').includes('invalid-credential') ? '이메일 또는 비밀번호가 올바르지 않습니다.' :
                (e.code || '').includes('too-many-requests') ? '시도가 너무 많습니다. 잠시 후 다시 시도하세요.' :
                (e.message || '로그인 실패');
    loginErr.textContent = msg;
    setLoginLoading(false);
  }
}

loginBtn.addEventListener('click', attemptLogin);
[loginEmail, loginPass].forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
});

fbAuth.onAuthStateChanged(user => {
  if (user) {
    loginScreen.classList.add('hidden');
    if (!appRendered) {
      appRendered = true;
      ReactDOM.render(React.createElement(App), document.getElementById('root'));
      setTimeout(() => loadingEl.classList.add('hidden'), 100);
    }
  } else {
    loadingEl.classList.add('hidden');
    loginScreen.classList.remove('hidden');
    setLoginLoading(false);
    setTimeout(() => loginEmail.focus(), 100);
  }
});

})();
</script>

</body>
</html>
